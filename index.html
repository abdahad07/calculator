<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script src="script.js"></script>
  </head>
  <body>
    <div id="calculator">
      <div id="screen">
        <div id="display-number">123</div>
      </div>
      <div class="btn-container-row">
        <button><i class="material-icons">&#xe14a;</i></button>
        <button>AC</button>
        <button>%</button>
        <button>÷</button>
      </div>
      <div class="btn-container-row">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>x</button>
      </div>
      <div class="btn-container-row">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
      </div>
      <div class="btn-container-row">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>
      </div>
      <div class="btn-container-row">
        <button>±</button>
        <button>0</button>
        <button>00</button>
        <button>=</button>
      </div>
      <div></div>
    </div>
  </body>
</html>
